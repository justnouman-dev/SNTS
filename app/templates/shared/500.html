{% extends 'shared/base.html' %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem">
  <div style="font-size:5rem;font-weight:900;color:var(--gray-200);line-height:1">500</div>
  <h2 style="font-size:1.4rem;font-weight:700;color:var(--gray-700);margin:.75rem 0 .5rem">Server Error</h2>
  <p style="color:var(--gray-500);margin-bottom:1.5rem">Something went wrong on our end. Please try again later.</p>
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('user.dashboard') if current_user.role != 'admin' else url_for('admin.dashboard') }}" class="btn btn-primary">
      <i class="fa-solid fa-house fa-xs"></i> Go to Dashboard
    </a>
  {% else %}
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary">
      <i class="fa-solid fa-arrow-left fa-xs"></i> Go to Login
    </a>
  {% endif %}
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SNTS - Smart Nutrient Tracking System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block navbar %}
    {% if session.get('user_id') %}
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="{{ url_for('dashboard.dashboard') }}" class="navbar-brand">🥗 SNTS</a>
            <ul class="navbar-menu">
                <li><a href="{{ url_for('dashboard.dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('food.food_log') }}">Food Log</a></li>
                <li><a href="{{ url_for('health.health_profile') }}">Health</a></li>
                <li><a href="{{ url_for('history.history') }}">History</a></li>
                <li><a href="{{ url_for('rewards.rewards') }}">Rewards</a></li>
                <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
            </ul>
        </div>
    </nav>
    {% endif %}
    {% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>

{% extends 'shared/base.html' %}
{% block title %}Reset Password{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-box">

  <div class="auth-brand">
    <div class="auth-brand-logo">S</div>
    <h2>SNTS</h2>
    <p>Reset your password</p>
  </div>

  <p style="font-size:.86rem;color:var(--gray-500);margin-bottom:1.25rem">
    Enter your username and choose a new password.
  </p>

  <form method="POST" action="{{ url_for('auth.forgot_password') }}" id="resetForm">

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required
             autofocus placeholder="Your username">
    </div>

    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="pw-wrap">
        <input type="password" id="npw1" name="new_password" class="form-control" required
               minlength="6" placeholder="min 6 characters">
        <button type="button" class="pw-eye" onclick="togglePw('npw1', this)" tabindex="-1">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <div class="pw-wrap">
        <input type="password" id="npw2" name="confirm_password" class="form-control" required
               placeholder="repeat new password">
        <button type="button" class="pw-eye" onclick="togglePw('npw2', this)" tabindex="-1">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-fw">Reset Password</button>

  </form>

  <div class="auth-footer">
    <a href="{{ url_for('auth.login') }}">Back to Sign In</a>
  </div>

</div>

<script>
document.getElementById('resetForm').addEventListener('submit', function(e) {
  const p1 = document.getElementById('npw1').value;
  const p2 = document.getElementById('npw2').value;
  if (p1 !== p2) {
    e.preventDefault();
    alert('Passwords do not match.');
  }
});
</script>
{% endblock %}

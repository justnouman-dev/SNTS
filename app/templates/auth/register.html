{% extends 'shared/base.html' %}
{% block title %}Create Account{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-box" style="max-width:480px;padding:2rem 1.75rem">

  <div class="auth-brand">
    <div class="auth-brand-logo">S</div>
    <h2>SNTS</h2>
    <p>Create your account</p>
  </div>

  <form method="POST" action="{{ url_for('auth.register') }}" id="regForm">

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Username <span style="color:var(--danger)">*</span></label>
        <input type="text" name="username" class="form-control" required
               minlength="3" maxlength="80" placeholder="min 3 chars" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Email <span style="color:var(--danger)">*</span></label>
        <input type="email" name="email" class="form-control" required
               placeholder="you@example.com" autocomplete="email">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Password <span style="color:var(--danger)">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw1" name="password" class="form-control" required
                 minlength="6" placeholder="min 6 chars" autocomplete="new-password">
          <button type="button" class="pw-eye" onclick="togglePw('pw1', this)" tabindex="-1">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password <span style="color:var(--danger)">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="pw2" name="confirm_password" class="form-control" required
                 placeholder="repeat password" autocomplete="new-password">
          <button type="button" class="pw-eye" onclick="togglePw('pw2', this)" tabindex="-1">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Height (cm) <span style="color:var(--danger)">*</span></label>
        <input type="number" name="height" id="inpH" class="form-control" required
               min="50" max="300" step="0.1" placeholder="e.g. 170" oninput="calcBMI()">
      </div>
      <div class="form-group">
        <label class="form-label">Weight (kg) <span style="color:var(--danger)">*</span></label>
        <input type="number" name="weight" id="inpW" class="form-control" required
               min="10" max="500" step="0.1" placeholder="e.g. 70" oninput="calcBMI()">
      </div>
    </div>

    <!-- Live BMI preview -->
    <div id="bmiPreview" style="display:none;background:var(--gray-50);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.65rem 1rem;margin-bottom:.75rem;font-size:.85rem">
      BMI: <strong id="bmiVal">—</strong>
      <span id="bmiCat" style="margin-left:.5rem;font-weight:700"></span>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Age <span style="color:var(--danger)">*</span></label>
        <input type="number" name="age" class="form-control" required
               min="5" max="120" placeholder="e.g. 25">
      </div>
      <div class="form-group">
        <label class="form-label">Gender <span style="color:var(--danger)">*</span></label>
        <select name="gender" class="form-control" required>
          <option value="" disabled selected>Select…</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Activity Level <span style="color:var(--danger)">*</span></label>
      <select name="activity_level" class="form-control" required>
        <option value="" disabled selected>Select…</option>
        <option value="sedentary">Sedentary (desk job / little exercise)</option>
        <option value="moderate">Moderate (exercise 3–5 days/week)</option>
        <option value="active">Active (exercise 6–7 days/week)</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary btn-fw" style="margin-top:.5rem">
      Create Account
    </button>

  </form>

  <div class="auth-footer">
    Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
  </div>

</div>

<script>
function calcBMI() {
  const h = parseFloat(document.getElementById('inpH').value);
  const w = parseFloat(document.getElementById('inpW').value);
  const prev = document.getElementById('bmiPreview');
  if (!h || !w || h < 50) { prev.style.display = 'none'; return; }
  const bmi = (w / ((h / 100) ** 2)).toFixed(1);
  let cat = '', color = '';
  if      (bmi < 18.5) { cat = 'Underweight'; color = '#1e40af'; }
  else if (bmi < 25)   { cat = 'Normal';       color = '#166534'; }
  else if (bmi < 30)   { cat = 'Overweight';   color = '#92400e'; }
  else                  { cat = 'Obese';        color = '#991b1b'; }
  document.getElementById('bmiVal').textContent = bmi;
  const catEl = document.getElementById('bmiCat');
  catEl.textContent = cat; catEl.style.color = color;
  prev.style.display = 'block';
}

document.getElementById('regForm').addEventListener('submit', function(e) {
  const p1 = document.getElementById('pw1').value;
  const p2 = document.getElementById('pw2').value;
  if (p1 !== p2) {
    e.preventDefault();
    alert('Passwords do not match. Please check and try again.');
  }
});
</script>
{% endblock %}

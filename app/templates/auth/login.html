{% extends 'shared/base.html' %}
{% block title %}Sign In{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-box">

  <div class="auth-brand">
    <div class="auth-brand-logo">S</div>
    <h2>SNTS</h2>
    <p>Smart Nutrient Tracking System</p>
  </div>

  <h3 style="font-size:1.1rem;font-weight:700;color:var(--gray-800);margin-bottom:.25rem">Welcome back</h3>
  <p style="font-size:.85rem;color:var(--gray-500);margin-bottom:1.25rem">Sign in to your account</p>

  <form method="POST" action="{{ url_for('auth.login') }}">

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input type="text" id="username" name="username" class="form-control"
             required autofocus autocomplete="username" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" name="password" class="form-control"
               required autocomplete="current-password" placeholder="Enter password">
        <button type="button" class="pw-eye" onclick="togglePw('password', this)" tabindex="-1">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>

    <div class="form-group" style="display:flex;align-items:center;justify-content:space-between">
      <div class="form-check">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
      </div>
      <a href="{{ url_for('auth.forgot_password') }}" style="font-size:.83rem">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-primary btn-fw btn-lg">Sign In</button>

  </form>

  <div class="auth-footer">
    Don't have an account?
    <a href="{{ url_for('auth.register') }}">Create one</a>
  </div>

</div>
{% endblock %}
